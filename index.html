<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cápsula do Tempo - Casamento</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Cápsula do Tempo</h1>
    <p>Deixe sua mensagem para o casal!</p>
    
    <video id="webcam" autoplay></video>
    <button id="capture">Tirar Foto</button>
    <canvas id="canvas" style="display:none;"></canvas>

    <div id="preview"></div>
    <button id="upload" style="display:none;">Enviar para a Cápsula</button>

    <p id="status"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
